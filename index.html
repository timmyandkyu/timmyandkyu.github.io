<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TimmyAndKyu</title>

  <style>
    body {
      margin: 0;
      padding: 40px 20px;
      font-family: sans-serif;
      background: black;
      color: white;
      text-align: center;
    }

    img {
      width: 120px;
      height: 120px;
      object-fit: cover;
      border-radius: 50%;
      margin-top: 20px;
    }

    h1 {
      font-size: 28px;
      margin: 15px 0;
    }

    p {
      color: gray;
      margin-bottom: 30px;
      font-size: 15px;
    }

    .btn {
  display: block;
  margin: 12px auto;
  width: 80%;
  max-width: 320px;
  padding: 16px;
  text-decoration: none;
  border-radius: 14px;
  font-weight: bold;
  font-size: 16px;
  transition: all 0.2s ease;
}

/* HOVER (Desktop) */
.btn:hover {
  transform: scale(1.05);
  box-shadow: 0 0 35px rgba(255,255,255,0.6);
}

/* ACTIVE (Mobile Finger drücken) */
.btn:active {
  transform: scale(0.97);
  box-shadow: 0 0 45px rgba(255,255,255,0.8);
}

    .btn.twitter:hover {
  box-shadow: 0 0 35px rgba(255,255,255,0.7);
}

.btn.instagram {
  background: #E1306C;
  color: white;
  box-shadow: 0 0 20px rgba(225,48,108,0.4);
}

    /* optional: stärkster Button (z.B. OnlyFans später) */
    .btn.primary {
      background: linear-gradient(135deg, #ff4d6d, #ff0066);
      color: white;
      box-shadow: 0 0 30px rgba(255, 0, 100, 0.4);
    }
  </style>
</head>

<body>

  <!-- Profilbild -->
  <img src="https://raw.githubusercontent.com/timmyandkyu/timmyandkyu.github.io/main/WhatsApp%20Image%202026-04-14%20at%2008.49.20.jpeg">

  <!-- Name -->
  <h1>TimmyAndKyu</h1>

  <!-- Beschreibung -->
  <p>
    👀 twinks • a little more than just friends • spicy
  </p>

  <!-- Buttons -->
  <a href="https://x.com/TimmyAndKyu" class="btn twitter">Twitter / X</a>

  <a href="https://www.instagram.com/timmyandkyu.official/" class="btn instagram">Instagram</a>

  <!-- Beispiel für später -->
  <!-- <a href="#" class="btn primary">🔥 Exclusive Content</a> -->

</body>
</html>
