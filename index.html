<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TimmyAndKyu</title>

  <style>
    body {
  margin: 0;
  padding: 40px 20px;
  font-family: sans-serif;
  color: white;
  text-align: center;
  background: black;
  position: relative;
}

/* Glow Blob */
body::before {
  content: "";
  position: fixed;
  top: 20%;
  left: 50%;
  transform: translateX(-50%);
  width: 300px;
  height: 300px;
  background: radial-gradient(circle, rgba(225,48,108,0.25), transparent 70%);
  filter: blur(80px);
  z-index: -1;
}
    
    img {
      width: 120px;
      height: 120px;
      object-fit: cover;
      border-radius: 50%;
      margin-top: 20px;
    }

    h1 {
      font-size: 28px;
      margin: 15px 0;
    }

    p {
      color: gray;
      margin-bottom: 30px;
      font-size: 15px;
    }

    /* BUTTON BASE */
    .btn {
      display: block;
      margin: 12px auto;
      width: 80%;
      max-width: 320px;
      padding: 16px;
      text-decoration: none;
      border-radius: 14px;
      font-weight: bold;
      font-size: 16px;
      position: relative;
      overflow: hidden;

      transition: all 0.2s ease;
    }

    /* GLOSS BASIS → UNSICHTBAR */
.btn::before {
  content: "";
  position: absolute;
  top: 0;
  left: -150%;
  width: 120%;
  height: 100%;
  background: linear-gradient(
    120deg,
    transparent,
    rgba(255,255,255,0.6),
    transparent
  );
  opacity: 0; /* wichtig */
  transition: all 0.4s ease;
}

/* NUR BEI HOVER */
.btn:hover::before {
  left: 100%;
  opacity: 1;
}

    /* HOVER / TAP */
    .btn:hover {
      transform: scale(1.05);
    }

    .btn:active {
      transform: scale(0.97);
    }

    /* BUTTON STYLES */
    .btn.twitter {
      background: white;
      color: black;
      box-shadow: 0 0 15px rgba(255,255,255,0.3);
    }

    .btn.instagram {
      background: #E1306C;
      color: white;
      box-shadow: 0 0 20px rgba(225,48,108,0.4);
    }

    /* optional: stärkster Button */
    .btn.primary {
      background: linear-gradient(135deg, #ff4d6d, #ff0066);
      color: white;
      box-shadow: 0 0 30px rgba(255, 0, 100, 0.4);
    }
  </style>
</head>

<body>

  <!-- Profilbild -->
  <img src="https://raw.githubusercontent.com/timmyandkyu/timmyandkyu.github.io/main/WhatsApp%20Image%202026-04-14%20at%2008.49.20.jpeg">

  <!-- Name -->
  <h1>TimmyAndKyu</h1>

  <!-- Beschreibung -->
  <p>
    👀 twinks • a little more than just friends • spicy
  </p>

  <!-- Buttons -->
  <a href="https://x.com/TimmyAndKyu" class="btn twitter">Twitter / X</a>

  <a href="https://www.instagram.com/timmyandkyu.official/" class="btn instagram">Instagram</a>

  <!-- später -->
  <!-- <a href="#" class="btn primary">🔥 Exclusive Content</a> -->

</body>
</html>
