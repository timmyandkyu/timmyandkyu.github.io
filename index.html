<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TimmyAndKyu</title>

  <style>
    body {
      margin: 0;
      padding: 40px 20px;
      font-family: sans-serif;
      background: black;
      color: white;
      text-align: center;
      position: relative;
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background:
        radial-gradient(circle at center, rgba(225, 48, 108, 0.18) 0%, rgba(225, 48, 108, 0.08) 18%, rgba(0, 0, 0, 0) 45%);
      pointer-events: none;
      z-index: 0;
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      background:
        radial-gradient(circle at top center, rgba(255, 255, 255, 0.06) 0%, rgba(255, 255, 255, 0.02) 12%, rgba(0, 0, 0, 0) 35%);
      pointer-events: none;
      z-index: 0;
    }

    .content {
      position: relative;
      z-index: 1;
    }

    img {
      width: 120px;
      height: 120px;
      object-fit: cover;
      border-radius: 50%;
      margin-top: 20px;
      box-shadow: 0 0 20px rgba(255, 255, 255, 0.08);
    }

    h1 {
      font-size: 28px;
      margin: 15px 0;
    }

    p {
      color: gray;
      margin-bottom: 30px;
      font-size: 15px;
    }

    .btn {
      display: block;
      margin: 12px auto;
      width: 80%;
      max-width: 320px;
      padding: 16px;
      text-decoration: none;
      border-radius: 14px;
      font-weight: bold;
      font-size: 16px;
      transition: transform 0.18s ease, box-shadow 0.18s ease, opacity 0.18s ease;
    }

    .btn:hover {
  transform: scale(1.05);
  opacity: 0.98;
}

/* Desktop Glow */
.btn.twitter:hover {
  box-shadow: 0 0 40px rgba(255,255,255,0.8);
}

.btn.instagram:hover {
  box-shadow: 0 0 40px rgba(225,48,108,0.9);
}

/* Mobile Feedback (Finger drücken) */
.btn:active {
  transform: scale(0.97);
  box-shadow: 0 0 50px rgba(255,255,255,0.9);
}

    .btn.twitter {
      background: white;
      color: black;
    }

    .btn.instagram {
  background: #E1306C;
  color: white;
  box-shadow: 0 0 20px rgba(225,48,108,0.3);
}

    .btn.primary {
      background: linear-gradient(135deg, #ff4d6d, #ff0066);
      color: white;
      box-shadow: 0 0 30px rgba(255, 0, 100, 0.4);
    }
 .btn.primary {
    animation: pulse 2.2s infinite;
  }

  @keyframes pulse {
    0% { box-shadow: 0 0 20px rgba(255,0,100,0.4); }
    50% { box-shadow: 0 0 40px rgba(255,0,100,0.8); }
    100% { box-shadow: 0 0 20px rgba(255,0,100,0.4); }
  }
</style>
</head>

<body>
  <div class="content">
    <img src="https://raw.githubusercontent.com/timmyandkyu/timmyandkyu.github.io/main/WhatsApp%20Image%202026-04-14%20at%2008.49.20.jpeg">

    <h1>TimmyAndKyu</h1>

    <p>
      👀 twinks • a little more than just friends • spicy
    </p>

<p style="font-size:13px; opacity:0.6;">
  updated every few days
</p>

    <a href="#" class="btn primary">🔥 Exclusive Content</a>
    
    <a href="https://x.com/TimmyAndKyu" class="btn twitter">Twitter / X</a>
    <a href="https://www.instagram.com/timmyandkyu.official/" class="btn instagram">Instagram</a>

    <!-- <a href="#" class="btn primary">🔥 Exclusive Content</a> -->
  </div>
</body>
</html>
