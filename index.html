<!DOCTYPE html>
<html>
<style>
  .btn {
    display: block;
    margin: 15px auto;
    width: 80%;
    max-width: 300px;
    padding: 15px;
    text-decoration: none;
    border-radius: 12px;
    font-weight: bold;
    transition: transform 0.18s ease, box-shadow 0.18s ease, opacity 0.18s ease;
  }

  .btn:hover,
  .btn:active {
    transform: scale(1.03);
    box-shadow: 0 0 18px rgba(255,255,255,0.18);
    opacity: 0.96;
  }

  .btn.twitter {
    background: white;
    color: black;
  }

  .btn.instagram {
    background: #E1306C;
    color: white;
  }
</style>

<body style="margin:0; padding:30px 20px; font-family:sans-serif; background:black; color:white; text-align:center;">
  
  <!-- Profilbild -->

       style="width:120px; height:120px; border-radius:50%; margin-top:30px;">

  <!-- Name -->
  <h1 style="font-size:28px; margin:15px 0;">TimmyAndKyu</h1>

  <!-- Beschreibung -->

  </p>

  <!-- Buttons -->
  <a href="https://x.com/TimmyAndKyu"
     style="display:block; margin:10px auto; width:80%; max-width:300px; padding:15px;
     background:white; color:black; text-decoration:none; border-radius:12px; font-weight:bold;">
    Twitter / X
  </a>

  <a href="https://www.instagram.com/timmyandkyu.official/"
     style="display:block; margin:10px auto; width:80%; max-width:300px; padding:15px;
     background:#E1306C; color:white; text-decoration:none; border-radius:12px; font-weight:bold;">
    Instagram
  </a>

</body>
</html>
